<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wolfie AI Agent</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    #chat-container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    #answer { margin-top: 20px; padding: 10px; background: #e9e9e9; border-radius: 5px; min-height: 50px; }
    input, button { padding: 10px; font-size: 16px; }
    input { width: 80%; margin-right: 10px; }
  </style>
</head>
<body>
  <div id="chat-container">
    <h2>Wolfie AI Agent</h2>
    <div>
      <input type="text" id="question" placeholder="اكتب سؤالك هنا..." />
      <button onclick="askAgent()">إرسال</button>
    </div>
    <div id="answer"></div>
  </div>

  <script>
    async function askAgent() {
      const question = document.getElementById('question').value;
      if(!question) return;

      const answerDiv = document.getElementById('answer');
      answerDiv.textContent = "جاري الرد...";

      try {
        const response = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await response.json();
        answerDiv.textContent = data.answer || "لم يتم الرد.";
      } catch (err) {
        answerDiv.textContent = "حدث خطأ في الاتصال بالـ AI Agent.";
        console.error(err);
      }
    }
  </script>
</body>
</html>
